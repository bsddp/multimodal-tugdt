project:
  name: multimodal-tugdt
  root: ".."
  random_seed: 42

paths:
  manifest: data/synthetic/participants.csv
  interim_dir: data/interim
  processed_dir: data/processed
  output_dir: outputs

modalities:
  imu: true
  video: false
  audio: true
  footswitch: true
  clinical: true

imu:
  format: wide_csv
  target_sensor: pelvis
  columns:
    timestamp: timestamp
    acc_ap: pelvis_acc_ap
    acc_ml: pelvis_acc_ml
    acc_vertical: pelvis_acc_vertical
    gyro_yaw: pelvis_gyro_yaw
    quat_w: quat_w
    quat_x: quat_x
    quat_y: quat_y
    quat_z: quat_z
  target_sampling_rate_hz: 100
  lowpass_cutoff_hz: 6
  filter_order: 4
  input_acceleration_unit: m/s^2
  input_angular_velocity_unit: rad/s
  gravity_removal: constant
  gravity_value_m_s2: 9.80665
  maximum_abs_acceleration_m_s2: 50
  maximum_abs_angular_velocity_rad_s: 20
  step_min_interval_s: 0.35
  step_prominence: 0.15
  generate_plots: true

synchronization:
  reference_modality: imu
  method: manual_offset
  offsets_seconds:
    video: 0.0
    audio: 0.0
    footswitch: 0.0
  uncertainty_seconds:
    video: 0.0
    audio: 0.0
    footswitch: 0.0
  timestamp_columns:
    footswitch: timestamp
  operator: synthetic_demo
  notes: Explicit zero offsets are recorded for generated demonstration data.
  maximum_duration_difference_s: 0.5
  minimum_overlap_ratio: 0.9
  generate_plots: true

audio:
  target_sampling_rate_hz: 16000
  frame_duration_ms: 30
  energy_threshold_dbfs: -35
  minimum_speech_duration_s: 0.20
  minimum_pause_duration_s: 0.20
  task_start_seconds: 0.0
  clipping_threshold: 0.999

footswitch:
  timestamp_column: timestamp
  left_contact_column: left_contact
  right_contact_column: right_contact
  threshold: 0.5
  minimum_contact_duration_s: 0.08
  minimum_swing_duration_s: 0.08
  event_matching_tolerance_s: 0.15

video:
  enable_pose_estimation: false
  pose_backend: mediapipe
  pose_model_path: null
  frame_step: 1
  minimum_visibility: 0.5
  minimum_pose_detection_confidence: 0.5
  minimum_pose_presence_confidence: 0.5
  minimum_tracking_confidence: 0.5

study:
  allowed_conditions:
    - single_task
    - dual_task
    - motor_only
    - cognitive_only
  cognitive_task: serial_subtraction

synthetic:
  duration_seconds: 20.0
  imu_sampling_rate_hz: 100
  audio_sampling_rate_hz: 16000
